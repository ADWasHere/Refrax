quarkus.datasource.devservices.enabled=true

# The app self-provisions a Timescale hypertable in ensureSchema(), so tests run on a
# TimescaleDB image (not plain Postgres) — otherwise create_hypertable() would not exist.
quarkus.datasource.devservices.image-name=timescale/timescaledb:latest-pg17

quarkus.datasource.devservices.init-script-path=db/init.sql

# The read-model consumer is triggered deterministically from tests, not on a timer.
quarkus.scheduler.enabled=false
