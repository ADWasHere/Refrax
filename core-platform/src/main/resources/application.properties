quarkus.datasource.db-kind=postgresql

quarkus.http.port=${HTTP_PORT:8787}

%dev.quarkus.datasource.reactive.url=${DB_URL}
%prod.quarkus.datasource.reactive.url=${DB_URL}

quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}

# Comma-separated classpath resources; add a file here to declare another event type.
refrax.schema.locations=schemas/air-quality-reading.json

# Comma-separated classpath resources; add a file here to declare another view.
refrax.view.locations=views/air-quality-full.json,views/air-quality-value-only.json